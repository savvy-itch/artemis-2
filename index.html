<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rocket Science</title>
  <style>
    * {
      padding: 0;
      margin: 0;
    }
    body {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      justify-content: center;
      align-items: center;
      width: 100dvw;
      height: 100dvh;
      background-color: #546696;
    }
    h1 {
      color: white;
      font-family: sans-serif;
    }
    .wrapper {
      position: relative;
    }
    .space {
      background: black;
      display: block;
    }
    .top {
      display: block;
      position: absolute;
      top: 0;
      /* border: 1px solid red; */
    }
  </style>
</head>
<body>
  <h1>Artemis II Flight Trajectory</h1>
  <div class="wrapper">
    <canvas id="space" class="space" width="1400" height="720"></canvas>
    <canvas id="top" class="top" width="1400" height="720"></canvas>
  </div>
  <script src="./main_time.js" type="module"></script>
</body>
</html>
